<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreSMP</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    background:#22c55e;
    padding:30px;
    font-size:45px;
    font-weight:bold;
}

.container{
    padding:40px;
}

.ip-box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    display:inline-block;
    font-size:20px;
    margin-top:15px;
}

.status-box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    display:inline-block;
    font-size:18px;
    margin-top:15px;
    min-width:250px;
}

button{
    margin-top:20px;
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

#joinServerBtn{
    background:#22c55e;
    color:white;
}

#joinServerBtn:hover{
    background:#16a34a;
}

#discordBtn{
    background:#5865F2;
    color:white;
    margin-left:10px;
}

#discordBtn:hover{
    background:#4752c4;
}

.rules{
    margin-top:40px;
    background:#1e293b;
    padding:25px;
    border-radius:10px;
    width:60%;
    margin-left:auto;
    margin-right:auto;
    text-align:left;
}

footer{
    margin-top:50px;
    padding:20px;
    background:#020617;
    font-size:14px;
}
</style>
</head>

<body>

<header>
CoreSMP
</header>

<div class="container">

<h2>Welcome to CoreSMP!</h2>
<p>A fun survival multiplayer Minecraft server.</p>

<!-- Buttons -->
<button id="joinServerBtn" onclick="joinServer()">Join Server</button>
<button id="discordBtn" onclick="discordJoin()"> Join our Discord</button>

<!-- Server IP -->
<div id="ipDisplay" class="ip-box" style="display:none;">
Server IP: <b id="serverIP">core.eagler.host</b>
</div>

<div class="rules">
<h3>Server Rules</h3>
<p>1. Be respectful to all players</p>
<p>2. No hacking or cheating</p>
<p>3. No griefing or stealing</p>
<p>4. No spam or advertising</p>
<p>5. Listen to staff members</p>
<p>6. Have fun!</p>
</div>

</div>

<footer>
© 2026 CoreSMP Server
</footer>

<script>
// Change your server IP here anytime
const SERVER_IP = "core.eagler.host";
const SERVER_PORT = 25565; // Default Minecraft port

document.getElementById("serverIP").innerText = SERVER_IP;

function joinServer(){
    document.getElementById("ipDisplay").style.display = "block";
    navigator.clipboard.writeText(SERVER_IP);
    alert("Server IP copied: " + SERVER_IP);
}

function discordJoin(){
    window.open("https://discord.gg/7SaT6rR8Br", "_blank");
}


</script>

</body>
</html>
